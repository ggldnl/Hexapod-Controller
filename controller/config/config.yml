# Hexapod Robot Configuration

# Geometric parameters
kinematics:

  body:

    position: [0.0, 0.0, 0.0]
    orientation: [0.0, 0.0, 0.0]

    # length: 165  # mm
    # width: 114   # mm
    # height: 14   # mm

  legs:

    coxa: 62     # mm
    femur: 77    # mm
    tibia: 100   # mm

    # Leg mounting position and orientation relative to body center

    front_right:
      position: [82.0, -57.0, 0.0]
      orientation: [0.0, 0.0, -45]

    middle_right:
      position: [0.0, -71.0, 0.0]
      orientation: [0.0, 0.0, -90]

    rear_right:
      position: [-82.0, -57.0, 0.0]
      orientation: [0.0, 0.0, -135]

    rear_left:
      position: [-82.0, 57.0, 0.0]
      orientation: [0.0, 0.0, 135]

    middle_left:
      position: [0.0, 71.0, 0.0]
      orientation: [0.0, 0.0, 90]

    front_left:
      position: [82.0, 57.0, 0.0]
      orientation: [0.0, 0.0, 45]

# Hardware parameters
hardware:
  
  # Servo pin assignments: [coxa, femur, tibia]
  pins:
    front_right: [0, 1, 2]
    middle_right: [3, 4, 5]
    rear_right: [6, 7, 8]
    rear_left: [9, 10, 11]
    middle_left: [12, 13, 14]
    front_left: [15, 16, 17]
  
  # Servo calibration offsets in degrees
  trim:
    front_right: [0, 0, 0]
    middle_right: [0, 0, 0]
    rear_right: [0, 0, 0]
    rear_left: [0, 0, 0]
    middle_left: [0, 0, 0]
    front_left: [0, 0, 0]
  
  # Servo direction multipliers (1 or -1)
  direction:
    front_right: [1, 1, 1]
    middle_right: [1, 1, 1]
    rear_right: [1, 1, 1]
    rear_left: [1, 1, 1]
    middle_left: [1, 1, 1]
    front_left: [1, 1, 1]

# Gait parameters
gaits:

  tripod:
    duty_factor: 0.5
    step_height: 30   # mm
    overlap: 0.0
  
  wave:
    duty_factor: 0.83
    step_height: 35   # mm
    overlap: 0.0
  
  ripple:
    duty_factor: 0.67
    step_height: 30   # mm
    overlap: 0.1

# Control parameters
control:

  cycle_time: 1.0  # seconds
  update_rate: 50  # Hz

# Safety limits
safety:

  voltage_min: 6.0    # V
  current_max: 15.0   # A

  lin_vel_max: 100    # mm/s
  ang_vel_max: 60     # deg/s

  body_lin_vel_max: 50  # mm/s
  body_ang_vel_max: 30  # deg/s

  # Expressed in joint space
  coxa_range: [-90, 90]
  femur_range: [-90, 90]
  tibia_range: [0, 120]

  # Body position and orientation delta range
  x_range: [-50, 50]
  y_range: [-50, 50]
  z_range: [0, 50]

  roll_range: [-10, 10]
  pitch_range: [-10, 10]
  yaw_range: [-10, 10]

  stance_radius: 240